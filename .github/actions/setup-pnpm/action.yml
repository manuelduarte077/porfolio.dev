name: Setup pnpm
description: Install pnpm, Node.js, and dependencies (frozen lockfile).

inputs:
  node-version:
    description: Node.js version
    required: false
    default: "20"

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@v4
      with:
        version: 9

    - uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: pnpm

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile
